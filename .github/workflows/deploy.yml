name: Deploy VPS

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

env:
  DEPLOY_PATH: /opt/gerador-certificados-expell
  VPS_PORT: ${{ secrets.VPS_PORT || 22 }}

jobs:
  deploy:
    name: Deploy para VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar arquivos essenciais
        run: |
          test -f index.html
          test -f app.js
          test -f styles.css
          test -f Dockerfile
          test -f docker-compose.yml
          test -f nginx.conf
          test -d assets

      - name: Configurar SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Publicar na VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tmp' \
            -czf - . \
            | ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
              "set -e
              mkdir -p '$DEPLOY_PATH'
              tar -xzf - -C '$DEPLOY_PATH'
              cd '$DEPLOY_PATH'
              docker compose up -d --build
              docker ps --filter name=gerador-certificados-expell"
